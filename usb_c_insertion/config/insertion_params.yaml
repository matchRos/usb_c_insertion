motion:
  probe_speed: 0.005
  retract_speed: 0.02
  search_speed: 0.003
  search_traverse_speed: 0.012
  move_speed: 0.05
  max_linear_speed: 0.05
  max_angular_speed: 0.25
  max_linear_acceleration: 0.03
  max_angular_acceleration: 0.15
  twist_smoothing_alpha: 0.25
  watchdog_timeout: 0.1
  pose_servo_position_kp: 1.5
  pose_servo_position_ki: 0.0
  pose_servo_position_kd: 0.0
  pose_servo_position_integral_limit: 0.02
  pose_servo_orientation_gain: 1.0
  pose_servo_position_tolerance: 0.0005
  pose_servo_orientation_tolerance: 0.01
  pose_servo_target_timeout: 15.0
  action_settle_time: 0.15
  action_timeout: 60.0
  action_feedback_rate: 20.0
  action_pipeline_wait_timeout: 2.0
  enforce_workspace_limits: true
  min_target_x: 0.0
  min_target_z: 0.0
  stop_repeat_count: 3
  command_rate: 500.0

micro_motion:
  max_distance: 0.02
  max_velocity: 0.10
  max_acceleration: 0.4
  max_jerk: 15.0
  min_duration: 0.04
  max_duration: 1.0
  monitor_tf: true
  max_overshoot: 0.001

contact:
  baseline_window: 10
  force_threshold_x: 2.0
  force_threshold_y: 2.0
  force_threshold_z: 2.0
  force_threshold_norm: 5.0
  torque_threshold: 0.2
  wrench_timeout: 0.2
  hysteresis: 0.5

probe:
  retract_distance: 0.005
  surface_retract_distance: 0.0015
  inter_probe_backoff_distance: 0.01
  second_probe_y_offset: 0.02
  max_probe_distance: 0.2
  probe_timeout: 20.0

search:
  pattern: "spiral"
  step_x: 0.0019
  step_y: 0.0013
  max_search_width: 0.015
  max_search_height: 0.015
  search_timeout: 90.0
  preferred_tool_x_sign: -1.0
  preferred_z_sign: 1.0
  diagonal_first: true
  transfer_timeout: 1.2
  transfer_max_velocity: 0.0
  transfer_max_acceleration: 0.0
  transfer_max_jerk: 0.0
  transfer_arc_enabled: true
  transfer_arc_height: 0.004
  pre_probe_clearance: 0.001
  pre_probe_settle_time: 0.1
  zero_ft_before_search: true
  initial_probe_speed: 0.010
  initial_probe_max_travel: 0.06
  initial_probe_timeout: 8.0
  probe_speed: 0.006
  probe_timeout: 1.8
  probe_max_travel: 0.004
  contact_force_target: 1.0
  socket_depth_threshold: 0.0020
  verify_initial_contact: true
  verification_required: false
  verify_timeout: 2.0
  direct_stop_repeat_count: 10
  direct_stop_interval: 0.001

center_port:
  action_name: "center_port_in_image"
  image_topic: "/zedm/zed_node/left/image_rect_color"
  timeout: 100.0
  pixel_tolerance: 2.0
  stable_time: 0.35
  command_rate: 40.0
  gain: 0.001
  max_velocity: 0.012
  max_acceleration: 0.03
  output_smoothing_alpha: 0.2
  coarse_pose_servo_enabled: true
  coarse_pose_servo_pixel_tolerance: 35.0
  coarse_pose_servo_position_gain: 0.00005
  coarse_pose_servo_max_step: 0.025
  coarse_pose_servo_timeout: 3.0
  coarse_pose_servo_position_tolerance: 0.002
  coarse_pose_servo_max_iterations: 3
  max_image_age: 0.5
  max_lost_time: 1.0
  min_blob_area: 120.0
  image_rotation_deg: 180.0
  image_to_tool_rotation_deg: -90.0
  image_error_to_tool_x_sign: 1.0
  image_error_to_tool_y_sign: 1.0
  hsv_lower: [35, 70, 40]
  hsv_upper: [90, 255, 255]
  morph_kernel_size: 5

looming:
  action_name: "verify_looming"
  image_topic: "/zedm/zed_node/left/image_rect_color"
  travel_distance: 0.025
  travel_speed: 0.006
  timeout: 8.0
  command_rate: 40.0
  min_blob_area: 120.0
  min_scale_ratio: 1.12
  max_center_shift_px: 10.0
  max_aspect_ratio_change: 0.35
  tool_z_direction_sign: 1.0
  max_image_age: 0.5
  max_lost_time: 0.5
  image_rotation_deg: 180.0
  hsv_lower: [35, 70, 40]
  hsv_upper: [90, 255, 255]
  morph_kernel_size: 5

housing_plane:
  action_name: "estimate_housing_plane"
  image_topic: "/zedm/zed_node/left/image_rect_color"
  cloud_topic: "/zedm/zed_node/point_cloud/cloud_registered"
  base_transform_frame: "usb_c_zedm_left_camera_optical_frame"
  cloud_to_base_transform_rotation: "camera_frame_to_optical"
  timeout: 3.0
  command_rate: 20.0
  min_blob_area: 120.0
  roi_radius_px: 70
  roi_stride_px: 2
  depth_window_m: 0.06
  ransac_iterations: 120
  ransac_distance_threshold: 0.004
  min_inliers: 120
  use_svd_refit: true
  use_largest_component: true
  marker_ray_window_px: 2
  max_image_age: 0.5
  max_cloud_age: 0.5
  image_rotation_deg: 180.0
  hsv_lower: [35, 70, 40]
  hsv_upper: [90, 255, 255]
  morph_kernel_size: 5

align_housing_yaw:
  action_name: "align_housing_yaw"
  estimate_action_name: "estimate_housing_plane"
  move_action_name: "move_to_pose"
  image_topic: "/zedm/zed_node/left/image_rect_color"
  cloud_topic: "/zedm/zed_node/point_cloud/cloud_registered"
  estimate_timeout: 3.0
  yaw_tolerance_rad: 0.01
  max_iterations: 15
  max_yaw_step_rad: 0.25
  settle_time: 0.15
  move_timeout: 20.0
  estimate_wait_timeout: 5.0
  move_wait_timeout: 5.0
  tool_axis: [0.0, 0.0, 1.0]
  target_axis_from_plane_normal_sign: -1.0

insert:
  action_name: "insert_cable"
  insertion_depth: 0.01
  contact_force_target: 20.0
  contact_force_tolerance: 1.0
  force_control_gain: 0.003
  force_control_speed_limit: 0.008
  force_control_timeout: 8.0
  force_target_oscillation_enabled: true
  force_target_oscillation_frequency: 1.0
  force_target_min_ratio: 0.0
  min_insertion_time: 1.0
  force_success_min_depth: 0.006
  zero_ft_before_insert: false
  wiggle_enabled: true
  wiggle_speed_y: 0.001
  wiggle_speed_x: 0.0002
  wiggle_frequency: 2.0
  release_force_threshold: 2.0

verify:
  action_name: "verify_insertion"
  action_timeout: 2.0
  zero_ft_before_verify: false
  move_distance_y: 0.00025
  move_distance_z: 0.00025
  move_speed: 0.002
  move_timeout: 2.0
  counterforce_threshold_y: 1.0
  counterforce_threshold_z: 1.0
  settle_time: 0.1

insertion_workflow:
  zero_ft_before_contact: true
  zero_ft_settle_time: 0.2
  pipeline_wait_timeout: 3.0
  approach_tool_z_sign: 1.0
  approach_speed: 0.004
  approach_timeout: 8.0
  approach_max_travel: 0.04
  approach_contact_force: 1.0
  contact_settle_time: 0.1
  pull_tool_z_sign: -1.0
  pull_force_mode: "tool_z"
  zero_ft_before_pull: true
  pull_force_target: 5.0
  pull_force_tolerance: 0.5
  pull_force_gain: 0.002
  pull_speed_limit: 0.004
  pull_timeout: 2.0
  pull_hold_time: 0.25
  pull_max_retraction: 0.0015
  return_to_contact_after_failed_pull: true
  return_timeout: 3.0
  lateral_verify_after_failed_pull: true
  zero_ft_before_lateral_verify: true
  lateral_verify_timeout: 2.0
  verification_zero_ft_settle_time: 0.25
  search_enabled: true
  search_timeout: 90.0
  search_step_tool_x: 0.001
  search_step_base_z: 0.001
  search_width_tool_x: 0.008
  search_height_base_z: 0.006
  search_preferred_tool_x_sign: -1.0
  search_preferred_base_z_sign: 1.0
  search_pre_probe_clearance: 0.0015
  search_pre_probe_settle_time: 0.05
  search_transfer_timeout: 3.0
  search_probe_speed_limit: 0.0015
  search_probe_min_speed: 0.0002
  search_probe_force_gain: 0.003
  search_probe_timeout: 4.0
  search_probe_max_travel: 0.004
  search_contact_force_target: 1.5
  search_contact_force_abort_threshold: 5.0
  search_socket_depth_threshold: 0.002
  search_candidate_pull_verify: true
  search_candidate_lateral_verify: true
  search_insert_after_candidate: true
  search_continue_after_unverified_candidate: false
  search_direct_stop_repeat_count: 20
  search_direct_stop_interval: 0.001

extract:
  distance: 0.05
  pull_force_target: 8.0
  pull_force_tolerance: 1.0
  pull_force_gain: 0.003
  max_pull_speed: 0.006
  tool_z_direction_sign: -1.0
  wiggle_speed_y: 0.002
  wiggle_speed_z: 0.0
  wiggle_frequency: 2.0
  timeout: 8.0
  max_lateral_force: 25.0
  max_torque_norm: 5.0
  release_after_extract: true

gripper:
  open_via_script_command: false
  open_script_command: ""
  fallback_digital_output_pin: 0
  fallback_digital_output_state: true
  io_service_name: "/ur_hardware_interface/set_io"

photo_pose:
  frame_id: "base_link"
  x: 0.50
  y: 0.10
  z: 0.30
  qx: 0.708
  qy: 0.0
  qz: 0.0
  qw: 0.705
  settle_time: 0.4
  timeout: 20.0
  require_fresh_vision_result: true

state_machine:
  auto_zero_ft: true
  target_offset_tool_x: +0.0
  target_offset_tool_y: +0.0
  prepose_offset: -0.01
  precontact_offset_tool_x: -0.000
  precontact_offset_tool_y: 0.000
  precontact_offset_tool_z: -0.016
  probe_offset_tool_x: 0.0
  probe_offset_tool_y: 0.0
  enforce_precontact_standoff: true
  min_precontact_standoff: 0.008
  prepose_speed: 0.035
  prepose_timeout: 30.0
  position_tolerance: 0.002

workflow:
  run_vision_timeout: 180.0
  vision_result_wait_timeout: 5.0
  refine_camera_frame: "usb_c_zedm_left_camera_optical_frame"
  refine_camera_distance: 0.14
  refine_yaw_delta_sign: 1.0
  refine_yaw_max_delta_deg: 45.0
  updated_port_pose_topic: "/usb_c_insertion/updated_port_pose"
  min_plane_inlier_ratio: 0.80
  max_plane_rms_error: 0.004
  photo_pose_max_linear_speed: 0.12
  photo_pose_max_angular_speed: 0.35
  prepose_max_linear_speed: 0.10
  prepose_max_angular_speed: 0.30
